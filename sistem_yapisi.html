  const tumAylar = [
    ...AYLAR.map(a=>({y:"2025",a,v:parseFloat(tuketim["2025"]?.[a])})),
    ...["Ocak","Şubat"].map(a=>({y:"2026",a,v:parseFloat(tuketim["2026"]?.[a])}))
  ].filter(x=>!isNaN(x.v)&&x.v>=0).slice(-12);
  return tumAylar.length ? tumAylar.reduce((s,x)=>s+x.v,0)/tumAylar.length : 0;
};
const son3AyOrt = (tuketim) => {
  const tumAylar = [
    ...AYLAR.map(a=>({v:parseFloat(tuketim["2025"]?.[a])})),
    ...["Ocak","Şubat"].map(a=>({v:parseFloat(tuketim["2026"]?.[a])}))
  ].filter(x=>!isNaN(x.v)&&x.v>=0).slice(-3);
  return tumAylar.length ? tumAylar.reduce((s,x)=>s+x.v,0)/tumAylar.length : 0;
};

// Global maliyet hesaplama - maliyetPb kur dönüşümü ile
function calcVaris(f, kurlarObj) {
  if(!f) return 0;
  const bp  = parseFloat(f.birimFiyat)||0;
  const md  = parseFloat(f.maliyetDeger)||0;
  const pb  = f.paraBirimi||"USD";
  const mPb = f.maliyetPb || pb;
  let mal = 0;
  if(f.maliyetTip==="yuzde") {
    mal = bp*(md/100);
  } else if(!mPb || mPb===pb) {
    mal = md;
  } else if(kurlarObj) {
    const k = (kurlarObj[`${mPb}_${pb}`])||0;
    mal = k>0 ? md*k : md;
  } else {
    mal = md; // kur yoksa ham değer
  }
  return bp + mal;
}
function calcMal(f, kurlarObj) {
  if(!f) return 0;
  const bp  = parseFloat(f.birimFiyat)||0;
  const md  = parseFloat(f.maliyetDeger)||0;
  const pb  = f.paraBirimi||"USD";
  const mPb = f.maliyetPb || pb;
  if(f.maliyetTip==="yuzde") return bp*(md/100);
  if(!mPb || mPb===pb) return md;
  if(kurlarObj){ const k=(kurlarObj[`${mPb}_${pb}`])||0; return k>0?md*k:md; }
  return md;
}

          <div style={{marginTop:16, background:"#0f1117", borderRadius:8, padding:"12px 16px", display:"flex", gap:24, flexWrap:"wrap"}}>
            {(() => {
              const vals = AYLAR.map(a=>parseFloat(form.tuketim[aktifYil][a])).filter(v=>!isNaN(v)&&v>=0);
              const toplam = vals.reduce((s,v)=>s+v,0);
              const ort = vals.length ? (toplam/vals.length) : 0;
              const maks = vals.length ? Math.max(...vals) : 0;
              const girilenAy = vals.length;
              return (
                <>
                  <div><span style={{fontSize:11,color:"#4b5563"}}>Girilen Ay</span><div style={{fontWeight:700,color:"#f1f5f9"}}>{girilenAy} / 12</div></div>
                  <div><span style={{fontSize:11,color:"#4b5563"}}>Toplam</span><div style={{fontWeight:700,color:YIL_RENKLER[aktifYil].text}}>{toplam.toLocaleString("tr-TR")}</div></div>
                  <div><span style={{fontSize:11,color:"#4b5563"}}>Ortalama</span><div style={{fontWeight:700,color:"#f1f5f9"}}>{ort.toLocaleString("tr-TR",{maximumFractionDigits:0})}</div></div>
                  <div><span style={{fontSize:11,color:"#4b5563"}}>En Yüksek</span><div style={{fontWeight:700,color:"#f1f5f9"}}>{maks.toLocaleString("tr-TR")}</div></div>
                </>
              );
            })()}
          </div>
        </div>
      </div>

      {/* Kaydet / İptal */}
      <div style={{display:"flex", gap:10, marginTop:16, justifyContent:"space-between", alignItems:"center"}}>
        {duzenleMode ? (
          <button onClick={onSil} style={{
            padding:"9px 18px", borderRadius:8, border:"1px solid #ef444455",
            background:"#2d1a1a", color:"#ef4444", cursor:"pointer",
            fontSize:13, fontWeight:700, display:"flex", alignItems:"center", gap:7
          }}
          onMouseEnter={e=>{e.currentTarget.style.background="#3d2020";e.currentTarget.style.borderColor="#ef4444";}}
          onMouseLeave={e=>{e.currentTarget.style.background="#2d1a1a";e.currentTarget.style.borderColor="#ef444455";}}>
            🗑️ Bu Hammaddeyi Sil
          </button>
        ) : <div/>}
        <div style={{display:"flex", gap:10}}>
          <button className="btn-secondary" onClick={onIptal}>İptal</button>
          <button className="btn-primary" onClick={onKaydet}>
            {duzenleMode ? "✏️ Güncelle" : "💾 Kaydet"}
          </button>
        </div>
      </div>
    </div>
  );
}

    setKurYukleniyor(true);

    fetch("https://open.er-api.com/v6/latest/USD")
      .then(r=>r.json())
      .then(d=>{
        if(d.rates){
          const usdTry = d.rates.TRY||0;
          const eurUsd = d.rates.EUR||0;  // EUR per 1 USD
          const gbpUsd = d.rates.GBP||0;  // GBP per 1 USD
          const usdEur = eurUsd>0 ? 1/eurUsd : 0;  // USD per EUR
          const usdGbp = gbpUsd>0 ? 1/gbpUsd : 0;  // USD per GBP
          const eurTry = usdTry * usdEur;
          const gbpTry = usdTry * usdGbp;
          setKurlar({
            // Kaynak → Hedef
            USD_TRY: usdTry,
            EUR_TRY: eurTry,
            GBP_TRY: gbpTry,
            EUR_USD: usdEur,
            GBP_USD: usdGbp,
            GBP_EUR: eurUsd>0 ? usdEur/usdGbp*usdGbp/usdEur * (usdEur/usdGbp) : 0,
            USD_EUR: eurUsd,
            USD_GBP: gbpUsd,
            EUR_GBP: gbpUsd/eurUsd,
            TRY_USD: usdTry>0 ? 1/usdTry : 0,
            TRY_EUR: eurTry>0 ? 1/eurTry : 0,
            TRY_GBP: gbpTry>0 ? 1/gbpTry : 0,
            tarih: new Date(d.time_last_update_utc).toLocaleDateString("tr-TR")
          });
        }
      })
      .catch(()=>{
        // Fallback yaklaşık kurlar
        setKurlar({USD_TRY:38.5,EUR_TRY:41.2,GBP_TRY:48.8,EUR_USD:1.07,GBP_USD:1.27,GBP_EUR:1.18,USD_EUR:0.93,USD_GBP:0.79,EUR_GBP:0.84,TRY_USD:0.026,TRY_EUR:0.024,TRY_GBP:0.020,tarih:"Tahmini (offline)"});
      })

  },[]);

  const goster = (mesaj, tip="basari") => {

      fiyatGecmisi: m.fiyatGecmisi || [],

  const kaydet = () => {

        const yeniGecmis = fiyatDegisti

                          const birim = m.fiyat?.fiyatBirimi||"ton";
                          const miktar = parseFloat(sp.miktar)||0;

                                <div style={{fontSize:10,color:"#475569",marginTop:2}}>{m.stokKodu}</div>

          return (
            <div style={{animation:"fadeIn 0.3s"}}>
              <div style={{marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>

                    {fiyatTabloSecili.length>0&&<span style={{marginLeft:8,color:"#a78bfa",fontWeight:700}}>· {fiyatTabloSecili.length} seçili</span>}

                          const f = m.fiyat;
                          const bp = parseFloat(f.birimFiyat)||0;

                          const mal = calcMal(f, kurlar);

                              <td style={{padding:"10px 13px"}} onClick={e=>{e.stopPropagation();setFiyatTabloSecili(p=>p.includes(m.id)?p.filter(x=>x!==m.id):[...p,m.id]);}}>
                                <input type="checkbox" checked={fiyatTabloSecili.includes(m.id)}
                                  onChange={()=>{}} style={{cursor:"pointer",width:14,height:14}}/>
                              </td>
                              <td style={{padding:"10px 13px",fontWeight:600,color:"#f1f5f9",maxWidth:200,cursor:"pointer"}} onClick={()=>detay(m)}>{m.hammaddeIsmi}</td>

                                  color:tur==="G"?"#34d399":"#fbbf24",border:`1px solid ${tur==="G"?"#10b98155":"#f59e0b55"}`}}>

                                  if(pb2==="EUR") eurVaris = varis;
                                  else { const k = (kurlar||{})[`${pb2}_EUR`]||0; eurVaris = k>0?varis*k:0; }
                                  return eurVaris>0 ? (
                                    <span style={{fontWeight:700,color:"#a78bfa",fontSize:12}}>{eurVaris.toFixed(2)} <span style={{fontSize:10,fontWeight:400,color:"#475569"}}>EUR</span></span>
                                  ) : <span style={{color:"#334155"}}>—</span>;
                                })()}
                              </td>
                              <td style={{padding:"10px 13px",fontWeight:700,color:"#fbbf24"}}>{topBedel>0?topBedel.toLocaleString("tr-TR",{maximumFractionDigits:0})+" "+f.paraBirimi:"—"}</td>
                              <td style={{padding:"10px 13px",textAlign:"center"}}>
                                {(m.fiyatGecmisi||[]).length>0
                                  ? <span style={{background:"#1e2430",color:"#94a3b8",borderRadius:10,padding:"1px 8px",fontSize:11}}>{m.fiyatGecmisi.length}</span>
                                  : <span style={{color:"#334155"}}>—</span>}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                  {/* Alt toplam */}
                  {(()=>{

                    const pbToplam = {};
                    const pbToplamSec = {};
                    fiyatlilar.forEach(m=>{
                      const f=m.fiyat; if(!f) return;
                      const varis=calcVaris(f,kurlar);
                      const birim=f.fiyatBirimi||"ton";
                      const stok=parseFloat(m.stokMiktari)||0;
                      const stokB=birim==="ton"?stok/1000:stok;
                      const pb=f.paraBirimi||"?";
                      pbToplam[pb]=(pbToplam[pb]||0)+varis*stokB;
                    });
                    secilenler.forEach(m=>{
                      const f=m.fiyat; if(!f) return;
                      const varis=calcVaris(f,kurlar);
                      const birim=f.fiyatBirimi||"ton";
                      const stok=parseFloat(m.stokMiktari)||0;
                      const stokB=birim==="ton"?stok/1000:stok;
                      const pb=f.paraBirimi||"?";
                      pbToplamSec[pb]=(pbToplamSec[pb]||0)+varis*stokB;

                              <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                                {pbListesi.map(pb=>(pbToplamSec[pb]||0)>0&&(

          const seciliMaddeler = fiyatlilar.filter(m=>secili.includes(m.id));

                      }}>
                        <span style={{fontWeight:700,color:sec?"#f1f5f9":"#94a3b8",fontSize:12}}>{m.hammaddeIsmi.length>22?m.hammaddeIsmi.slice(0,22)+"…":m.hammaddeIsmi}</span>
                        <span style={{fontSize:11,color:sec?"#34d399":"#475569"}}>{varis.toFixed(2)} {f.paraBirimi}/{f.fiyatBirimi||"ton"}</span>
                      </button>

              </div>

              {/* Karşılaştırma tablosu */}
              {seciliMaddeler.length>=2 && (

                  <div style={{padding:"14px 18px",borderBottom:"1px solid #1e2430",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>

                          <th style={{padding:"10px 14px",textAlign:"left",color:"#475569",fontWeight:700,fontSize:10,borderBottom:"1px solid #1e2430"}}>KRİTER</th>

                            <th key={m.id} style={{padding:"10px 14px",textAlign:"left",color:"#60a5fa",fontWeight:700,fontSize:11,borderBottom:"1px solid #1e2430",minWidth:160}}>
