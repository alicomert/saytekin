                            </th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {[
                          {label:"Tedarikçi", fn:m=>m.tedarikci||"—"},
                          {label:"Menşei Ülke", fn:m=>m.menseiUlke||"—"},
                          {label:"Paketleme", fn:m=>PAKETLEME_TIPLERI.find(p=>p.kod===m.paketleme)?.ad||"—"},
                          {label:"Teslim Şekli", fn:m=>m.fiyat?.teslimatSekli||"—"},
                          {label:"Para Birimi", fn:m=>m.fiyat?.paraBirimi||"—"},
                          {label:"Fiyat Birimi", fn:m=>"/"+( m.fiyat?.fiyatBirimi||"ton")},
                          {label:"Maliyet Türü", fn:m=>(m.fiyat?.maliyetTur||"T")==="G"?"G — Gerçekleşen":"T — Tahmini", renkFn:m=>(m.fiyat?.maliyetTur||"T")==="G"?"#34d399":"#fbbf24"},
                          {label:"Birim Fiyat", fn:m=>{const f=m.fiyat;return f?`${parseFloat(f.birimFiyat).toFixed(2)} ${f.paraBirimi}`:"—"}, sayisal:true, renkFn:(m,min,max)=>{const v=parseFloat(m.fiyat?.birimFiyat)||0;return v===min?"#34d399":v===max?"#ef4444":"#f1f5f9"}},
                          {label:"Nakliye/Maliyet", fn:m=>{const f=m.fiyat;if(!f)return "—";const bp=parseFloat(f.birimFiyat)||0,md=parseFloat(f.maliyetDeger)||0;const mal=calcMal(f,kurlar);const mPb=f.maliyetPb||f.paraBirimi||"USD";return `${mal.toFixed(2)} ${f.paraBirimi}${f.maliyetTip==="yuzde"?` (%${md})`:mPb!==f.paraBirimi?` (=${md} ${mPb})`:""}`;}, sayisal:true},
                          {label:"Birim Varış Maliyeti", fn:m=>{const f=m.fiyat;if(!f)return "—";const v=calcVaris(f,kurlar);return `${v.toFixed(2)} ${f.paraBirimi||""}`;}, sayisal:true, vurgulu:true,
                            renkFn:(m,min,max)=>{const f=m.fiyat;if(!f)return "#f1f5f9";const v=calcVaris(f,kurlar);return v===min?"#34d399":v===max?"#ef4444":"#f1f5f9"}},
                          {label:"Mevcut Stok (kg)", fn:m=>m.stokMiktari?Number(m.stokMiktari).toLocaleString("tr-TR")+" kg":"—"},
                          {label:"Toplam Stok Bedeli", fn:m=>{const f=m.fiyat;if(!f)return "—";const varis=calcVaris(f,kurlar);const stok=parseFloat(m.stokMiktari)||0;const birim=f.fiyatBirimi||"ton";const stokB=birim==="ton"?stok/1000:stok;return `${(varis*stokB).toLocaleString("tr-TR",{maximumFractionDigits:0})} ${f.paraBirimi||""}`;}, sayisal:true},
                          {label:"Geçmiş Fiyat Kayıtları", fn:m=>(m.fiyatGecmisi||[]).length+" kayıt"},
                          {label:"Varış Maliyeti (EUR)", vurgulu:true, eurSatir:true, fn:m=>{
                            if(!kurlar||!m.fiyat) return "—";
                            const f=m.fiyat;
                            const varis2=calcVaris(f,kurlar);
                            const pb2=f.paraBirimi||"USD";
                            let eurV=0;
                            if(pb2==="EUR") eurV=varis2;
                            else {const k=kurlar[`${pb2}_EUR`]||0; eurV=k>0?varis2*k:0;}
                            return eurV>0?`${eurV.toFixed(2)} EUR`:"Kur yok";
                          }, renkFn:(m,min,max)=>{
                            if(!kurlar||!m.fiyat) return "#f1f5f9";
                            const f=m.fiyat;
                            const varis2=calcVaris(f,kurlar);
                            const pb2=f.paraBirimi||"USD";
                            let eurV=0;
                            if(pb2==="EUR") eurV=varis2;
                            else {const k=kurlar[`${pb2}_EUR`]||0; eurV=k>0?varis2*k:0;}
                            return eurV===min?"#34d399":eurV===max?"#ef4444":"#f1f5f9";
                          }, sayisal:true},
                        ].map((satir,si)=>{
                          // sayisal kriter için min/max bul
                          const sayisalDeger = m => {
                            const f=m.fiyat;if(!f)return Infinity;
                            if(satir.label==="Birim Fiyat") return parseFloat(f.birimFiyat)||0;
                            if(satir.label==="Birim Varış Maliyeti") return calcVaris(f,kurlar);
                            if(satir.eurSatir){
                              if(!kurlar) return Infinity;
                              const varis=calcVaris(f,kurlar);
                              const pb2=f.paraBirimi||"USD";
                              if(pb2==="EUR") return varis;
                              const k=(kurlar||{})[`${pb2}_EUR`]||0;
                              return k>0?varis*k:Infinity;
                            }
                            return 0;
                          };
                          const vals = satir.sayisal&&satir.renkFn ? seciliMaddeler.map(sayisalDeger).filter(v=>v!==Infinity&&v>0) : [];
                          const minV = vals.length ? Math.min(...vals) : 0;
                          const maxV = vals.length ? Math.max(...vals) : 0;
                          return (
                            <tr key={si} style={{borderBottom:"1px solid #1e2430",background:si%2===0?"transparent":"#0a0e15"}}>
                              <td style={{padding:"10px 14px",color:"#64748b",fontWeight:700,fontSize:11,whiteSpace:"nowrap"}}>{satir.label}</td>
                              {seciliMaddeler.map(m=>{
                                const val = satir.fn(m);
                                const renk = satir.renkFn ? satir.renkFn(m,minV,maxV) : (satir.vurgulu?"#34d399":"#f1f5f9");
                                return (
                                  <td key={m.id} style={{padding:"10px 14px",fontWeight:satir.vurgulu?700:400,color:renk,fontSize:satir.vurgulu?14:12}}>
                                    {val}
                                    {satir.vurgulu && vals.length>0 && sayisalDeger(m)===minV && minV!==maxV && (
                                      <span style={{marginLeft:6,fontSize:10,background:"#10b98133",color:"#34d399",borderRadius:3,padding:"1px 5px",fontWeight:700}}>EN DÜŞÜK</span>
                                    )}
                                    {satir.vurgulu && vals.length>0 && sayisalDeger(m)===maxV && minV!==maxV && (
                                      <span style={{marginLeft:6,fontSize:10,background:"#ef444433",color:"#ef4444",borderRadius:3,padding:"1px 5px",fontWeight:700}}>EN YÜKSEK</span>
                                    )}
                                  </td>
                                );
                              })}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
              {seciliMaddeler.length===1 && (
                <div style={{textAlign:"center",padding:30,color:"#475569",fontSize:13}}>⚖️ Karşılaştırma için en az 2 hammadde seçin.</div>
              )}
              {seciliMaddeler.length===0 && (
                <div style={{textAlign:"center",padding:30,color:"#475569",fontSize:13}}>Yukarıdan hammaddeleri seçerek karşılaştırma başlatın.</div>
              )}
            </div>
          );
        })()}

        {/* İSTATİSTİKLER EKRANI */}
        {ekran==="stokguncelle" && (()=>{
          // En son hangi yıl+ay verisi girilmiş otomatik hesapla
          const buYil = new Date().getFullYear();
          const buAy = new Date().getMonth(); // 0-indexed
          // Aktif yıl ve eksik ay hesapla
          const aktifYilSG = String(buYil) in YILLAR.reduce((o,y)=>{o[y]=y;return o;},{}) ? buYil : YILLAR[YILLAR.length-1];
          const eksikAyIdx = buAy; // 0-indexed (Ocak=0, Şubat=1 ...)
          const eksikAy = AYLAR[eksikAyIdx]; // mevcut ay henüz girilmemiş
          const eksikAyLabel = `${eksikAy} ${buYil}`;
          // Bir önceki ay hesabı
          const oncekiAyIdx = eksikAyIdx > 0 ? eksikAyIdx - 1 : 11;
          const oncekiAyYil = eksikAyIdx > 0 ? buYil : buYil - 1;
          const oncekiAy = AYLAR[oncekiAyIdx];
          const oncekiAyLabel = `${oncekiAy} ${oncekiAyYil}`;

          // Sadece S olan hammaddeler, isme göre sırala
          const sListe = liste.filter(m => m.sk==="S"||m.sk==="s")
            .slice().sort((a,b)=>a.hammaddeIsmi.localeCompare(b.hammaddeIsmi,"tr"));

          // Stok + tüketim düzenleme state değişiklik fonksiyonları
          const guncelleStok = (id, deger) => {
            setListe(p=>p.map(m=>m.id===id?{...m,stokMiktari:deger}:m));
          };
          const guncelleAyTuk = (id, yil, ay, deger) => {
            setListe(p=>p.map(m=>{
              if(m.id!==id) return m;
              const yeniTuketim = {...m.tuketim, [yil]:{...m.tuketim[yil],[ay]:deger}};
              return {...m, tuketim:yeniTuketim};
            }));
          };

          return (
            <div style={{animation:"fadeIn 0.3s"}}>
              {/* Başlık */}
              <div style={{marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:8}}>
                <div>
                  <h2 style={{fontSize:22,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>🔄 Stok Güncelleme</h2>
                  <p style={{color:"#475569",fontSize:13}}>
                    {sListe.length} standart hammadde · Stok miktarı ve <strong style={{color:"#38bdf8"}}>{eksikAyLabel}</strong> tüketimi güncellenebilir
                  </p>
                </div>
                <div style={{background:"#0c1f2e",border:"1px solid #38bdf833",borderRadius:8,padding:"8px 16px",fontSize:12,color:"#38bdf8",fontWeight:700}}>
                  📅 Güncelleme ayı: {eksikAyLabel}
                </div>
              </div>

              {/* Tablo */}
              <div style={{background:"#141820",border:"1px solid #1e2430",borderRadius:12,overflow:"hidden"}}>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                    <thead>
                      <tr style={{background:"#0d1017",borderBottom:"2px solid #1e2430"}}>
                        <th style={{padding:"11px 14px",textAlign:"left",color:"#475569",fontWeight:700,fontSize:10,letterSpacing:"0.06em",whiteSpace:"nowrap"}}>#</th>
                        <th style={{padding:"11px 14px",textAlign:"left",color:"#475569",fontWeight:700,fontSize:10,letterSpacing:"0.06em",whiteSpace:"nowrap"}}>HAMMADDE</th>
                        <th style={{padding:"11px 14px",textAlign:"left",color:"#475569",fontWeight:700,fontSize:10,letterSpacing:"0.06em",whiteSpace:"nowrap"}}>TÜR</th>
                        <th style={{padding:"11px 14px",textAlign:"right",color:"#475569",fontWeight:700,fontSize:10,letterSpacing:"0.06em",whiteSpace:"nowrap"}}>MEVCUT STOK (kg)</th>
                        <th style={{padding:"11px 14px",textAlign:"right",color:"#38bdf8",fontWeight:700,fontSize:10,letterSpacing:"0.06em",whiteSpace:"nowrap",background:"#0c1f2e"}}>
                          📦 YENİ STOK (kg)
                        </th>
                        <th style={{padding:"11px 14px",textAlign:"right",color:"#475569",fontWeight:700,fontSize:10,letterSpacing:"0.06em",whiteSpace:"nowrap"}}>
                          {oncekiAy.toUpperCase()} {oncekiAyYil} TÜK.
                        </th>
                        <th style={{padding:"11px 14px",textAlign:"right",color:"#38bdf8",fontWeight:700,fontSize:10,letterSpacing:"0.06em",whiteSpace:"nowrap",background:"#0c1f2e"}}>
                          🗓 {eksikAy.toUpperCase()} {buYil} TÜK. GİR
                        </th>
                        <th style={{padding:"11px 14px",textAlign:"right",color:"#475569",fontWeight:700,fontSize:10,letterSpacing:"0.06em",whiteSpace:"nowrap"}}>ORT. AYLIK</th>
                        <th style={{padding:"11px 14px",textAlign:"right",color:"#475569",fontWeight:700,fontSize:10,letterSpacing:"0.06em",whiteSpace:"nowrap"}}>OPTİMUM</th>
                        <th style={{padding:"11px 14px",textAlign:"center",color:"#475569",fontWeight:700,fontSize:10,letterSpacing:"0.06em",whiteSpace:"nowrap"}}>DURUM</th>
                      </tr>
                    </thead>
                    <tbody>
                      {sListe.map((m, idx) => {
                        const stok = parseFloat(m.stokMiktari)||0;
                        const opt  = parseFloat(m.hesaplananOptimum)||0;
                        // Termin vs kalanGun
                        const sgTermin = m.termin?[m.termin.akreditif,m.termin.saticiTedarik,m.termin.yol,m.termin.depoKabul].reduce((s,v)=>s+(parseFloat(v)||0),0):parseFloat(m.terminSuresi)||0;
                        const sgT25 = Object.values(m.tuketim["2025"]||{}).map(v=>parseFloat(v)).filter(v=>!isNaN(v)&&v>0);
                        const sgT26 = Object.values(m.tuketim["2026"]||{}).map(v=>parseFloat(v)).filter(v=>!isNaN(v)&&v>0);
                        const sgAylik = [...sgT25,...sgT26].length?[...sgT25,...sgT26].reduce((s,v)=>s+v,0)/[...sgT25,...sgT26].length:0;
                        const sgKalan = sgAylik>0?Math.round(stok/(sgAylik/30)):null;
                        const oran = sgKalan!=null&&sgTermin>0?sgKalan/sgTermin:sgKalan!=null?99:1;
                        const durumRenk = oran>=2?"#34d399":oran>=1?"#eab308":oran>=0.5?"#f97316":"#ef4444";
                        const durumLabel = oran>=2?"RAHAT":oran>=1?"TAKİPTE":oran>=0.5?"SİPARİŞ VER":"ACİL SİPARİŞ";
                        const ortAylik = Math.round(son12AyOrt(m.tuketim));
                        // Bir önceki ay tüketimi
                        const gecenYilTuk = parseFloat(m.tuketim?.[String(oncekiAyYil)]?.[oncekiAy])||0;
                        // Bu yıl ilgili ay mevcut değeri
                        const mevcutAyTuk = m.tuketim?.[String(buYil)]?.[eksikAy];
                        const ayTukDolu = mevcutAyTuk !== "" && mevcutAyTuk !== undefined && mevcutAyTuk !== null && !isNaN(parseFloat(mevcutAyTuk));

                        return (
                          <tr key={m.id}
                            style={{borderBottom:"1px solid #1e2430",background:ayTukDolu?"transparent":"#110d05"}}
                            onMouseEnter={e=>e.currentTarget.style.background=ayTukDolu?"#1a2130":"#1a1505"}
                            onMouseLeave={e=>e.currentTarget.style.background=ayTukDolu?"transparent":"#110d05"}>

                            {/* Sıra */}
                            <td style={{padding:"10px 14px",color:"#334155",fontSize:11}}>{idx+1}</td>

                            {/* Hammadde adı */}
                            <td style={{padding:"10px 14px",maxWidth:220}}>
                              <div style={{fontWeight:700,color:"#f1f5f9",fontSize:13}}>{m.hammaddeIsmi}</div>
                              <div style={{fontSize:10,color:"#475569",marginTop:1}}>{m.urunKodu}</div>
                            </td>

                            {/* Tür */}
                            <td style={{padding:"10px 14px"}}>
                              <span style={{background:"#1e2430",borderRadius:4,padding:"2px 7px",fontSize:10,color:"#94a3b8"}}>{m.tur||"—"}</span>
                            </td>

                            {/* Mevcut stok */}
                            <td style={{padding:"10px 14px",textAlign:"right",fontWeight:700,color:durumRenk,fontFamily:"monospace",fontSize:13}}>
                              {stok.toLocaleString("tr-TR")}
                            </td>

                            {/* YENİ STOK input */}
                            <td style={{padding:"6px 8px",background:"#0c1f2e"}}>
                              <input
                                type="number"
                                placeholder={stok>0?stok.toLocaleString("tr-TR"):"—"}
                                style={{
                                  width:"100%",minWidth:110,background:"#0a1520",
                                  border:"1px solid #38bdf844",borderRadius:6,
                                  padding:"6px 10px",color:"#38bdf8",fontSize:13,
                                  fontWeight:700,textAlign:"right",outline:"none",
                                  fontFamily:"monospace"
                                }}
                                onFocus={e=>e.target.style.borderColor="#38bdf8"}
                                onBlur={e=>{
                                  e.target.style.borderColor="#38bdf844";
                                  const v=e.target.value.trim();
                                  if(v!=="") guncelleStok(m.id, v);
                                  e.target.value="";
                                }}
                                onKeyDown={e=>{if(e.key==="Enter")e.target.blur();}}
                              />
                            </td>

                            {/* Geçen yıl aynı ay tüketim (referans) */}
                            <td style={{padding:"10px 14px",textAlign:"right",color:"#475569",fontFamily:"monospace",fontSize:12}}>
                              {gecenYilTuk>0?gecenYilTuk.toLocaleString("tr-TR",{maximumFractionDigits:0}):"—"}
                            </td>

                            {/* Bu yıl eksik ay tüketim input */}
                            <td style={{padding:"6px 8px",background:"#0c1f2e"}}>
                              <div style={{display:"flex",alignItems:"center",gap:4}}>
                                {ayTukDolu && (
                                  <span style={{color:"#34d399",fontSize:11,fontWeight:700,whiteSpace:"nowrap",fontFamily:"monospace"}}>
                                    ✓ {parseFloat(mevcutAyTuk).toLocaleString("tr-TR",{maximumFractionDigits:0})}
                                  </span>
                                )}
                                <input
                                  type="number"
                                  placeholder={ayTukDolu?"düzenle":"gir..."}
                                  style={{
                                    width:"100%",minWidth:100,background:"#0a1520",
                                    border:`1px solid ${ayTukDolu?"#34d39944":"#f59e0b66"}`,
                                    borderRadius:6,padding:"6px 10px",
                                    color:ayTukDolu?"#34d399":"#fbbf24",
                                    fontSize:13,fontWeight:700,textAlign:"right",
                                    outline:"none",fontFamily:"monospace"
                                  }}
                                  onFocus={e=>e.target.style.borderColor=ayTukDolu?"#34d399":"#f59e0b"}
                                  onBlur={e=>{
                                    e.target.style.borderColor=ayTukDolu?"#34d39944":"#f59e0b66";
                                    const v=e.target.value.trim();
                                    if(v!=="") guncelleAyTuk(m.id, String(buYil), eksikAy, v);
                                    e.target.value="";
                                  }}
                                  onKeyDown={e=>{if(e.key==="Enter")e.target.blur();}}
                                />
                              </div>
                            </td>

                            {/* Ort. aylık */}
                            <td style={{padding:"10px 14px",textAlign:"right",color:"#94a3b8",fontFamily:"monospace",fontSize:12}}>
                              {ortAylik>0?ortAylik.toLocaleString("tr-TR"):"—"}
                            </td>

                            {/* Optimum */}
                            <td style={{padding:"10px 14px",textAlign:"right",fontFamily:"monospace",fontSize:12}}>
                              {opt>0?(
                                <span>
                                  <span style={{color:"#64748b"}}>{opt.toLocaleString("tr-TR")}</span>
                                  <span style={{fontSize:10,color:"#334155",display:"block"}}>({(opt/2).toLocaleString("tr-TR")})</span>
                                </span>
                              ):"—"}
                            </td>

                            {/* Durum */}
                            <td style={{padding:"10px 14px",textAlign:"center"}}>
                              <span style={{
                                background:durumRenk+"22",color:durumRenk,
                                border:`1px solid ${durumRenk}44`,
                                borderRadius:5,padding:"3px 9px",fontSize:11,fontWeight:700,
                                whiteSpace:"nowrap"
                              }}>{durumLabel}</span>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>

                {/* Alt bilgi */}
                <div style={{padding:"12px 18px",background:"#0d1017",borderTop:"1px solid #1e2430",display:"flex",gap:24,flexWrap:"wrap",alignItems:"center"}}>
                  <div style={{fontSize:11,color:"#475569"}}>
                    <span style={{color:"#f59e0b",fontWeight:700}}>■</span> Sarı arka plan = {eksikAyLabel} tüketimi henüz girilmemiş
                  </div>
                  <div style={{fontSize:11,color:"#475569"}}>
                    <span style={{color:"#34d399",fontWeight:700}}>✓</span> Yeşil = tüketim girilmiş
                  </div>
                  <div style={{fontSize:11,color:"#475569",marginLeft:"auto"}}>
                    {sListe.filter(m=>{const v=m.tuketim?.[String(buYil)]?.[eksikAy];return v!==""&&v!==undefined&&!isNaN(parseFloat(v));}).length} / {sListe.length} hammaddenin {eksikAyLabel} tüketimi girildi
                  </div>
                </div>
              </div>
            </div>
          );
        })()}

        {ekran==="istatistik" && (()=>{
          const N = (v,d=0) => isNaN(v)||!v ? "—" : Number(v).toLocaleString("tr-TR",{maximumFractionDigits:d});

          // Sadece S (Standart) hammaddeler
          const istatListe = liste.filter(m=>m.sk==="S"||m.sk==="s");

          // Genel toplamlar
          const toplamStok = istatListe.reduce((s,m)=>s+(parseFloat(m.stokMiktari)||0),0);
          const ihtiyacSay = istatListe.filter(m=>parseFloat(m.stokMiktari)<parseFloat(m.hesaplananOptimum)/2&&parseFloat(m.hesaplananOptimum)>0).length;

          // Yıllara göre toplam tüketim
          const yilToplam = {};
          YILLAR.forEach(y=>{
            yilToplam[y] = istatListe.reduce((s,m)=>{
              const vals = AYLAR.map(a=>parseFloat(m.tuketim[String(y)]?.[a])||0);
              return s + vals.reduce((a,b)=>a+b,0);
            },0);
          });
          const yilOrtToplamlar = {};
          YILLAR.forEach(y=>{
            const ayBas = istatListe.reduce((s,m)=>{
              const vals = AYLAR.map(a=>parseFloat(m.tuketim[String(y)]?.[a])).filter(v=>!isNaN(v)&&v>=0);
              return s+(vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0);
            },0);
            yilOrtToplamlar[y] = ayBas;
          });

          // Tür bazlı istatistik
          const turler = [...new Set(istatListe.map(m=>m.tur).filter(Boolean))];
          const turStats = turler.map(tur=>{
            const malz = istatListe.filter(m=>m.tur===tur);
            const ort2025 = malz.reduce((s,m)=>s+hesaplaOrt(m.tuketim,2025),0);
            const ort2024 = malz.reduce((s,m)=>s+hesaplaOrt(m.tuketim,2024),0);
            const s12 = malz.reduce((s,m)=>s+son12AyOrt(m.tuketim),0);
            return {tur, sayi:malz.length, ort2025, ort2024, s12};
          }).sort((a,b)=>b.ort2025-a.ort2025);

          // Her hammadde için yıllık istatistik
          const hammaddeStats = istatListe.map(m=>{
            const o23=hesaplaOrt(m.tuketim,2023), o24=hesaplaOrt(m.tuketim,2024), o25=hesaplaOrt(m.tuketim,2025);
            const s12=son12AyOrt(m.tuketim), s3=son3AyOrt(m.tuketim);
            const trend = o24>0 ? ((o25-o24)/o24*100) : null;
            return {...m, o23,o24,o25,s12,s3,trend};
          }).sort((a,b)=>b.o25-a.o25);

          const maxO25 = Math.max(...hammaddeStats.map(m=>m.o25));

          return (
            <div style={{animation:"fadeIn 0.3s"}}>
              <div style={{marginBottom:20}}>
                <h2 style={{fontSize:22,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>📊 İstatistikler</h2>
                <p style={{color:"#475569",fontSize:13}}>Yıllara ve hammaddelere göre tüketim analizleri</p>
              </div>

              {/* Genel özet kartlar */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:24}}>
                {[
                  {label:"Toplam Hammadde (S)",val:istatListe.length+" kalem",renk:"#3b82f6",bg:"#1d3557",icon:"📦"},
                  {label:"Toplam Stok",val:N(toplamStok)+" kg",renk:"#10b981",bg:"#0d2018",icon:"🏭"},
                  {label:"İhtiyaç Durumunda",val:ihtiyacSay+" kalem",renk:"#f59e0b",bg:"#2a1f0a",icon:"⚠️"},
                  {label:"2025 Aylık Ort. Toplam",val:N(yilOrtToplamlar[2025]),renk:"#8b5cf6",bg:"#1e1535",icon:"📈"},
                ].map((k,i)=>(
                  <div key={i} style={{background:k.bg,border:`1px solid ${k.renk}44`,borderRadius:12,padding:18,borderTop:`3px solid ${k.renk}`}}>
                    <div style={{fontSize:22,marginBottom:8}}>{k.icon}</div>
                    <div style={{fontSize:20,fontWeight:700,color:k.renk}}>{k.val}</div>
                    <div style={{fontSize:11,color:"#64748b",marginTop:4}}>{k.label}</div>
                  </div>
                ))}
              </div>

              {/* Yıllara göre toplam tüketim */}
              <div style={{background:"#141820",border:"1px solid #1e2430",borderRadius:12,padding:20,marginBottom:20}}>
                <div style={{fontSize:12,fontWeight:700,letterSpacing:"0.1em",color:"#64748b",marginBottom:16,textTransform:"uppercase"}}>Yıllara Göre Toplam Tüketim</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16}}>
                  {YILLAR.map((y,yi)=>{
                    const renk = YIL_RENKLER[y];
                    const oncekiY = YILLAR[yi-1];
                    const oncekiOrt = oncekiY ? yilOrtToplamlar[oncekiY]||0 : 0;
                    const buOrt = yilOrtToplamlar[y]||0;
                    const farkYuzde = oncekiOrt>0 ? Math.round((buOrt-oncekiOrt)/oncekiOrt*100) : null;
                    // Progress bar: maks yıl ortalamasına göre (görsel için)
                    const maxOrt = Math.max(...YILLAR.map(yy=>yilOrtToplamlar[yy]||0),1);
                    const barYuzde = Math.round(buOrt/maxOrt*100);
                    return (
                      <div key={y} style={{background:"#0f1117",borderRadius:10,padding:16,border:`1px solid ${renk.border}33`}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                          <div style={{fontSize:13,fontWeight:700,color:renk.text}}>{y}</div>
                          {farkYuzde!==null&&<span style={{fontSize:11,fontWeight:700,
                            color:farkYuzde>0?"#34d399":farkYuzde<0?"#ef4444":"#64748b",
                            background:farkYuzde>0?"#10b98122":farkYuzde<0?"#ef444422":"#1e2430",
                            padding:"2px 7px",borderRadius:4}}>
                            {farkYuzde>0?"▲ ":"▼ "}{Math.abs(farkYuzde)}%
                          </span>}
                        </div>
                        <div style={{fontSize:20,fontWeight:700,color:"#f1f5f9",marginBottom:2}}>{N(yilToplam[y])}</div>
                        <div style={{fontSize:11,color:"#475569",marginBottom:10}}>
                          Aylık ort: <strong style={{color:renk.text}}>{N(buOrt)}</strong>
                          {farkYuzde!==null&&<span style={{color:"#334155",marginLeft:5,fontSize:10}}>vs {N(oncekiOrt)}</span>}
                        </div>
                        <div style={{height:6,background:"#1e2430",borderRadius:3}}>
                          <div style={{width:`${barYuzde}%`,height:"100%",background:renk.border,borderRadius:3,transition:"width 0.6s"}}/>
                        </div>
                        <div style={{fontSize:10,color:"#475569",marginTop:4}}>
                          {farkYuzde===null?"İlk yıl":farkYuzde===0?"Önceki yıl ile aynı":`${oncekiY} aylık ort. ile karşılaştırma`}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Tür bazlı istatistik */}
              <div style={{background:"#141820",border:"1px solid #1e2430",borderRadius:12,padding:20,marginBottom:20}}>
                <div style={{fontSize:12,fontWeight:700,letterSpacing:"0.1em",color:"#64748b",marginBottom:16,textTransform:"uppercase"}}>Tür Bazlı Aylık Ortalama Tüketim</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead>
                      <tr style={{borderBottom:"1px solid #1e2430"}}>
                        {["Tür","Kalem","2024 Ort./Ay","2025 Ort./Ay","Son 12 Ay Ort.","Trend"].map(h=>(
                          <th key={h} style={{padding:"9px 14px",textAlign:"left",fontSize:10,color:"#475569",letterSpacing:"0.07em",fontWeight:700}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {turStats.map(t=>{
                        const trend = t.ort2024>0?((t.ort2025-t.ort2024)/t.ort2024*100):null;
                        return (
                          <tr key={t.tur} style={{borderBottom:"1px solid #1e2430"}}
                            onMouseEnter={e=>e.currentTarget.style.background="#1a2130"}
                            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                            <td style={{padding:"11px 14px"}}><span style={{background:"#1e2430",padding:"3px 10px",borderRadius:4,fontSize:12,color:"#94a3b8",fontWeight:700}}>{t.tur}</span></td>
                            <td style={{padding:"11px 14px",color:"#64748b",fontSize:12}}>{t.sayi}</td>
                            <td style={{padding:"11px 14px",color:"#a78bfa",fontSize:13,fontFamily:"monospace",fontWeight:600}}>{N(t.ort2024)}</td>
                            <td style={{padding:"11px 14px",color:"#34d399",fontSize:13,fontFamily:"monospace",fontWeight:600}}>{N(t.ort2025)}</td>
                            <td style={{padding:"11px 14px",color:"#fbbf24",fontSize:13,fontFamily:"monospace",fontWeight:600}}>{N(t.s12)}</td>
                            <td style={{padding:"11px 14px"}}>
                              {trend!==null && (
                                <span style={{color:trend>0?"#34d399":"#f87171",fontWeight:700,fontSize:12}}>
                                  {trend>0?"▲":"▼"} %{Math.abs(trend).toFixed(1)}
                                </span>
                              )}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Her hammadde için yıllık istatistik */}
              <div style={{background:"#141820",border:"1px solid #1e2430",borderRadius:12,padding:20}}>
                <div style={{fontSize:12,fontWeight:700,letterSpacing:"0.1em",color:"#64748b",marginBottom:16,textTransform:"uppercase"}}>Hammadde Bazlı Tüketim İstatistikleri (2025 tüketimine göre sıralı)</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",minWidth:900}}>
                    <thead>
                      <tr style={{borderBottom:"2px solid #1e2430",background:"#0d1017"}}>
                        {["Hammadde","Tür","2023 Ort.","2024 Ort.","2025 Ort.","Son 12 Ay","Son 3 Ay","2025 Trend","Gösterge"].map(h=>(
                          <th key={h} style={{padding:"10px 12px",textAlign:"left",fontSize:10,color:"#475569",letterSpacing:"0.07em",fontWeight:700,whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {hammaddeStats.map(m=>{
                        const trendRenk = m.trend===null?"#64748b":m.trend>10?"#34d399":m.trend<-10?"#f87171":"#fbbf24";
                        const barYuzde = maxO25>0?Math.round(m.o25/maxO25*100):0;
                        return (
                          <tr key={m.id} style={{borderBottom:"1px solid #1e2430"}}
                            onMouseEnter={e=>e.currentTarget.style.background="#1a2130"}
                            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                            <td style={{padding:"10px 12px",maxWidth:200}}>
                              <div style={{fontWeight:600,color:"#f1f5f9",fontSize:12}}>{m.hammaddeIsmi}</div>
                              {m.tedarikci&&<div style={{fontSize:10,color:"#475569"}}>🏭 {m.tedarikci}</div>}
                            </td>
                            <td style={{padding:"10px 12px"}}><span style={{background:"#1e2430",padding:"2px 7px",borderRadius:3,fontSize:10,color:"#94a3b8"}}>{m.tur}</span></td>
                            <td style={{padding:"10px 12px",color:"#60a5fa",fontSize:12,fontFamily:"monospace",textAlign:"right"}}>{N(m.o23)}</td>
                            <td style={{padding:"10px 12px",color:"#a78bfa",fontSize:12,fontFamily:"monospace",textAlign:"right"}}>{N(m.o24)}</td>
                            <td style={{padding:"10px 12px",color:"#34d399",fontSize:12,fontFamily:"monospace",textAlign:"right",fontWeight:700}}>{N(m.o25)}</td>
                            <td style={{padding:"10px 12px",color:"#fbbf24",fontSize:12,fontFamily:"monospace",textAlign:"right"}}>{m.s12>0?N(m.s12):"—"}</td>
                            <td style={{padding:"10px 12px",color:"#fb923c",fontSize:12,fontFamily:"monospace",textAlign:"right"}}>{m.s3>0?N(m.s3):"—"}</td>
                            <td style={{padding:"10px 12px"}}>
                              {m.trend!==null?(
                                <span style={{color:trendRenk,fontWeight:700,fontSize:11}}>
                                  {m.trend>0?"▲":"▼"} %{Math.abs(m.trend).toFixed(1)}
                                </span>
                              ):<span style={{color:"#334155"}}>—</span>}
                            </td>
                            <td style={{padding:"10px 12px",minWidth:100}}>
                              <div style={{height:6,background:"#1e2430",borderRadius:3}}>
                                <div style={{width:`${barYuzde}%`,height:"100%",background:"linear-gradient(90deg,#3b82f6,#8b5cf6)",borderRadius:3}}/>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        })()}

        {/* İHTİYAÇ LİSTESİ EKRANI */}
        {ekran==="ihtiyac" && (()=>{
          const ihtiyacListe = liste
            .filter(m => {
              const stok = parseFloat(m.stokMiktari)||0;
              const opt = parseFloat(m.hesaplananOptimum)||0;
              const sipMiktar = m.siparis?.verildi ? (parseFloat(m.siparis?.miktar)||0) : 0;
              const efektifStok = stok + sipMiktar;
              return m.sk !== "K" && m.sk !== "A" && opt > 0 && efektifStok < opt/2;
            })
            .map(m => {
              const stok = parseFloat(m.stokMiktari)||0;
              const opt = parseFloat(m.hesaplananOptimum)||0;
              const optEfektif = opt/2;
              const sipMiktar = m.siparis?.verildi ? (parseFloat(m.siparis?.miktar)||0) : 0;
              const efektifStok = stok + sipMiktar;
              const eksik = optEfektif - efektifStok;
              // Termin süresi
              const t = m.termin;
              const terminGun = t ? [t.akreditif,t.saticiTedarik,t.yol,t.depoKabul].reduce((s,v)=>s+(parseFloat(v)||0),0) : parseFloat(m.terminSuresi)||0;
              // Günlük tüketim ve kalan gün
              const t2025 = Object.values(m.tuketim["2025"]).map(v=>parseFloat(v)).filter(v=>!isNaN(v)&&v>0);
              const t2026 = Object.values(m.tuketim["2026"]).map(v=>parseFloat(v)).filter(v=>!isNaN(v)&&v>0);
              const tumTuk = [...t2025, ...t2026];
              const aylikOrt = tumTuk.length ? tumTuk.reduce((s,v)=>s+v,0)/tumTuk.length : 0;
              const gunlukTuk = aylikOrt / 30;
              const kalanGun = gunlukTuk > 0 ? Math.round(efektifStok / gunlukTuk) : null;
              // oran = kalanGun / terminGun (sipariş aciliyeti)
              const oran = (kalanGun != null && terminGun > 0) ? kalanGun / terminGun : (kalanGun != null ? 99 : null);
              return { ...m, stok, opt, eksik, oran, aylikOrt, kalanGun, terminGun };
            })
            .sort((a,b) => {
              // null oranları sona at, düşük oran önce (en acil)
              if(a.oran==null) return 1; if(b.oran==null) return -1;
              return a.oran - b.oran;
            });

          const acil      = ihtiyacListe.filter(m=>m.oran!=null && m.oran < 0.5);
          const siparisVer = ihtiyacListe.filter(m=>m.oran!=null && m.oran >= 0.5 && m.oran < 1);
          const takipte   = ihtiyacListe.filter(m=>m.oran==null || m.oran >= 1);

          return (
            <div style={{animation:"fadeIn 0.3s"}}>
              <div style={{marginBottom:20}}>
                <h2 style={{fontSize:22,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>⚠️ İhtiyaç Listesi</h2>
                <p style={{color:"#475569",fontSize:13}}>Stok miktarı hesaplanan optimumun altında kalan hammaddeler</p>
              </div>

              {/* Özet kartlar */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:24}}>
                {[
                  {label:"Toplam İhtiyaç",val:ihtiyacListe.length+" kalem",renk:"#f59e0b",bg:"#2a1f0a",icon:"📦"},
                  {label:"Siparişi Verilmiş",val:liste.filter(m=>m.siparis?.verildi).length+" kalem",renk:"#34d399",bg:"#0d2018",icon:"✅"},
                  {label:"Acil Sipariş (<%25)",val:acil.length+" kalem",renk:"#ef4444",bg:"#2d1a1a",icon:"🚨"},
                  {label:"Sipariş Ver (%25–75)",val:siparisVer.length+" kalem",renk:"#f97316",bg:"#2a1a0a",icon:"📦"},
                  {label:"Takipte (>%75)",val:takipte.length+" kalem",renk:"#eab308",bg:"#1f1e0a",icon:"👁"},
                ].map((k,i)=>(
                  <div key={i} style={{background:k.bg,border:`1px solid ${k.renk}44`,borderRadius:12,padding:18,borderTop:`3px solid ${k.renk}`}}>
                    <div style={{fontSize:22,marginBottom:8}}>{k.icon}</div>
                    <div style={{fontSize:22,fontWeight:700,color:k.renk}}>{k.val}</div>
                    <div style={{fontSize:11,color:"#64748b",marginTop:4}}>{k.label}</div>
                  </div>
                ))}
              </div>

              {ihtiyacListe.length === 0 ? (
                <div style={{textAlign:"center",padding:60,color:"#334155"}}>
                  <div style={{fontSize:48,marginBottom:12}}>✅</div>
                  <div style={{fontSize:16,color:"#475569"}}>Tüm hammaddeler yeterli stok seviyesinde!</div>
                </div>
              ) : (
                <div style={{background:"#141820",border:"1px solid #1e2430",borderRadius:12,overflow:"hidden"}}>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead>
                      <tr style={{background:"#0d1017",borderBottom:"2px solid #1e2430"}}>
                        {["Öncelik","S/K","Stok Kodu","Hammadde İsmi","Tür","Mevcut Stok","Optimum","Gereken Miktar","Stok Ömrü / Termin","Aylık Ort. Tük.","Tahmini Tükenme","Termin","Sipariş Durumu","İşlem"].map(h=>(
                          <th key={h} style={{padding:"11px 13px",textAlign:"left",fontSize:10,color:"#475569",letterSpacing:"0.07em",fontWeight:700,whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {ihtiyacListe.map((m,idx)=>{
                        const oncelik = m.oran==null
                          ? {renk:"#475569",bg:"#141820",etiket:"VERİ YOK",icon:"—"}
                          : m.oran < 0.5
                          ? {renk:"#ef4444",bg:"#2d1a1a",etiket:"ACİL SİPARİŞ",icon:"🚨"}
                          : m.oran < 1
                          ? {renk:"#f97316",bg:"#2a1a0a",etiket:"SİPARİŞ VER",icon:"📦"}
                          : m.oran < 2
                          ? {renk:"#eab308",bg:"#1f1e0a",etiket:"TAKİPTE",icon:"👁"}
                          : {renk:"#34d399",bg:"#0d2018",etiket:"RAHAT",icon:"✅"};
                        const yuzde = m.oran!=null ? Math.min(100,Math.round(m.oran*50)) : 0; // oran=2 → %100
                        const kalanText = m.kalanGun !== null
                          ? m.kalanGun <= 0 ? "Tükendi!"
                          : m.kalanGun < 30 ? `${m.kalanGun} gün`
                          : `~${Math.round(m.kalanGun/30)} ay`
                          : "—";
                        const kalanRenk = m.kalanGun !== null
                          ? m.kalanGun <= 7 ? "#ef4444"
                          : m.kalanGun <= 30 ? "#f97316"
                          : m.kalanGun <= 90 ? "#eab308"
                          : "#94a3b8"
                          : "#64748b";
                        return (
                          <tr key={m.id} style={{borderBottom:"1px solid #1e2430"}}
                            onMouseEnter={e=>e.currentTarget.style.background="#1a2130"}
                            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                            <td style={{padding:"12px 13px"}}>
                              <span style={{background:oncelik.bg,color:oncelik.renk,padding:"3px 9px",borderRadius:5,fontSize:11,fontWeight:700,border:`1px solid ${oncelik.renk}44`,whiteSpace:"nowrap"}}>
                                {oncelik.icon} {oncelik.etiket}
                              </span>
                            </td>
                            <td style={{padding:"12px 13px"}}>
                              <span style={{padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:700,
                                background:m.sk==="S"?"#1d3557":m.sk==="A"?"#221a05":"#2d1a1a",
                                color:m.sk==="S"?"#60a5fa":m.sk==="A"?"#fbbf24":"#f87171"}}>{m.sk}</span>
                            </td>
                            <td style={{padding:"12px 13px",color:"#94a3b8",fontSize:12,fontFamily:"monospace"}}>{m.stokKodu}</td>
                            <td style={{padding:"12px 13px",fontWeight:600,color:"#60a5fa",fontSize:13,maxWidth:220,cursor:"pointer",textDecoration:"underline",textDecorationStyle:"dotted",textUnderlineOffset:3}} onClick={()=>detay(m)}>{m.hammaddeIsmi}</td>
                            <td style={{padding:"12px 13px"}}><span style={{background:"#1e2430",padding:"2px 8px",borderRadius:4,fontSize:11,color:"#94a3b8"}}>{m.tur}</span></td>
                            <td style={{padding:"12px 13px",fontWeight:700,color:"#f87171",fontSize:13}}>{m.stok.toLocaleString("tr-TR")}</td>
                            <td style={{padding:"12px 13px",color:"#64748b",fontSize:12}}>{m.opt.toLocaleString("tr-TR")}</td>
                            <td style={{padding:"12px 13px",fontWeight:700,color:oncelik.renk,fontSize:13}}>{m.eksik.toLocaleString("tr-TR")}</td>
                            <td style={{padding:"12px 13px",minWidth:120}}>
                              <div style={{marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center",gap:6}}>
                                <span style={{fontSize:11,color:oncelik.renk,fontWeight:700}}>%{yuzde}</span>
                                <span style={{fontSize:9,color:oncelik.renk,fontWeight:700,opacity:0.8}}>
                                  {m.oran>=1?"✓ RAHAT":m.oran>=0.75?"👁 TAKİP":m.oran>=0.25?"📦 SİP.VER":"🚨 ACİL"}
                                </span>
                              </div>
                              <div style={{height:8,background:"#1e2430",borderRadius:4,overflow:"hidden"}}>
                                <div style={{
                                  width:`${yuzde}%`,height:"100%",borderRadius:4,
                                  background: (m.oran==null||m.oran<0.5)?"linear-gradient(90deg,#ef4444,#f97316)"
                                    : m.oran<1?"linear-gradient(90deg,#f97316,#eab308)"
                                    : "linear-gradient(90deg,#eab308,#84cc16)",
                                  transition:"width 0.5s"
                                }}/>
                              </div>
                            </td>
                            <td style={{padding:"12px 13px",color:"#94a3b8",fontSize:12}}>{m.aylikOrt>0?Math.round(m.aylikOrt).toLocaleString("tr-TR"):"—"}</td>
                            <td style={{padding:"12px 13px",fontWeight:700,color:kalanRenk,fontSize:13,whiteSpace:"nowrap"}}>{kalanText}</td>
                            <td style={{padding:"12px 13px",color:"#64748b",fontSize:12}}>{m.terminSuresi?m.terminSuresi+" gün":"—"}</td>
                            <td style={{padding:"10px 13px",minWidth:200}}>
                              {(()=>{
                                const sp = m.siparis || {};
                                const verildi = sp.verildi||false;
                                return verildi ? (
                                  <div style={{background:"#0d2018",border:"1px solid #10b98155",borderRadius:8,padding:"8px 10px"}}>
                                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                                      <span style={{fontSize:11,color:"#34d399",fontWeight:700}}>✅ Sipariş Verildi</span>
                                      <button onClick={()=>setListe(p=>p.map(x=>x.id===m.id?{...x,siparis:{verildi:false,miktar:"",tarih:"",sipNo:"",geldi:false}}:x))}
                                        style={{background:"#2d1a1a",border:"none",borderRadius:4,color:"#f87171",fontSize:10,padding:"2px 6px",cursor:"pointer"}}>✕ İptal</button>
                                    </div>
                                    {sp.sipNo&&<div style={{fontSize:11,color:"#fbbf24",fontWeight:700,marginBottom:3}}>📋 {sp.sipNo}</div>}
                                    <div style={{fontSize:11,color:"#94a3b8",marginBottom:2}}>
                                      Miktar: <strong style={{color:"#34d399"}}>{parseFloat(sp.miktar||0).toLocaleString("tr-TR")} kg</strong>
                                    </div>
                                    {sp.tarih&&<div style={{fontSize:10,color:"#475569"}}>📅 {sp.tarih}</div>}
                                  </div>
                                ) : (
                                  <div>
                                    {sipAcik?.id===m.id ? (
                                      <div style={{background:"#0d1a2d",border:"1px solid #3b82f655",borderRadius:8,padding:"10px"}}>
                                        <div style={{fontSize:11,color:"#60a5fa",fontWeight:700,marginBottom:6}}>🛒 Sipariş Bilgisi</div>
                                        <div style={{marginBottom:6}}>
                                          <div style={{fontSize:10,color:"#475569",marginBottom:3}}>Sipariş No</div>
                                          <input type="text" placeholder="ör: PO-2025-001" value={sipAcik.sipNo||""}
                                            onChange={e=>setSipAcik(p=>({...p,sipNo:e.target.value}))}
                                            style={{width:"100%",background:"#141820",border:"1px solid #1e2430",borderRadius:5,padding:"5px 8px",color:"#f1f5f9",fontSize:12}}/>
                                        </div>
                                        <div style={{marginBottom:8}}>
                                          <div style={{fontSize:10,color:"#475569",marginBottom:3}}>Miktar (kg)</div>
                                          <input type="number" value={sipAcik.miktar||""} min="0"
                                            onChange={e=>setSipAcik(p=>({...p,miktar:e.target.value}))}
                                            style={{width:"100%",background:"#141820",border:"1px solid #1e2430",borderRadius:5,padding:"5px 8px",color:"#34d399",fontWeight:700,fontSize:13}}/>
                                        </div>
                                        <div style={{display:"flex",gap:6}}>
                                          <button onClick={()=>{
                                            setListe(p=>p.map(x=>x.id===m.id?{...x,siparis:{verildi:true,miktar:String(sipAcik.miktar||0),sipNo:sipAcik.sipNo||"",tarih:new Date().toLocaleDateString("tr-TR"),geldi:false}}:x));
                                            setSipAcik(null);
                                          }} style={{flex:1,background:"#10b981",border:"none",borderRadius:6,padding:"7px",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>
                                            ✅ Kaydet
                                          </button>
                                          <button onClick={()=>setSipAcik(null)} style={{background:"#1e2430",border:"none",borderRadius:6,padding:"7px 12px",cursor:"pointer",color:"#64748b",fontSize:12}}>İptal</button>
                                        </div>
                                      </div>
                                    ) : (
                                      <button onClick={()=>setSipAcik({id:m.id, miktar:String(Math.max(0,Math.round((m.opt*2)-(parseFloat(m.stokMiktari)||0)))), sipNo:""})}
                                        style={{background:"#1a2535",border:"1px solid #3b82f655",borderRadius:7,padding:"7px 12px",cursor:"pointer",color:"#60a5fa",fontSize:11,fontWeight:700,width:"100%",textAlign:"center"}}>
                                        🛒 Sipariş Verildi İşaretle
                                      </button>
                                    )}
                                  </div>
                                );
                              })()}
                            </td>
                            <td style={{padding:"12px 13px"}}>
                              <div style={{display:"flex",gap:6}}>
                                <button onClick={()=>detay(m)} title="Detay" style={{background:"#1e2430",border:"none",borderRadius:6,padding:"5px 9px",cursor:"pointer",fontSize:13}}>👁</button>
                                <button onClick={()=>duzenle(m)} title="Düzenle" style={{background:"#1e2430",border:"none",borderRadius:6,padding:"5px 9px",cursor:"pointer",fontSize:13}}>✏️</button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          );
        })()}

        {/* DETAY EKRANI */}
        {ekran==="detay" && detayM && (
          <div style={{animation:"fadeIn 0.3s"}}>
            <div style={{marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                  <span style={{padding:"3px 10px",borderRadius:5,fontSize:12,fontWeight:700,
                    background:detayM.sk==="S"?"#1d3557":detayM.sk==="A"?"#221a05":"#2d1a1a",
                    color:detayM.sk==="S"?"#60a5fa":detayM.sk==="A"?"#fbbf24":"#f87171"}}>
                    {detayM.sk==="S"?"S — Standart":detayM.sk==="A"?"A — Alternatif":"K — Kapalı"}
                  </span>
                  <span style={{background:"#1e2430",padding:"3px 10px",borderRadius:4,fontSize:12,color:"#94a3b8"}}>{detayM.tur}</span>
                </div>
                <h2 style={{fontSize:22,fontWeight:700,color:"#f1f5f9"}}>{detayM.hammaddeIsmi}</h2>
                <p style={{color:"#475569",fontSize:13,marginTop:2}}>Stok: {detayM.stokKodu} · Ürün: {detayM.urunKodu}</p>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {/* Sekme bar */}
                {[
                  {key:"genel",lbl:"📋 Genel Bilgiler"},
                  {key:"fiyatGecmisi",lbl:`📋 Fiyat Geçmişi${(detayM.fiyatGecmisi||[]).length>0?" ("+detayM.fiyatGecmisi.length+")":""}`},
                ].map(t=>(
                  <button key={t.key} onClick={()=>setDetayTab(t.key)} style={{
                    padding:"8px 16px",borderRadius:7,border:"1px solid",fontSize:12,fontWeight:700,cursor:"pointer",
                    borderColor:detayTab===t.key?"#3b82f6":"#1e2430",
                    background:detayTab===t.key?"#1d3557":"transparent",
                    color:detayTab===t.key?"#60a5fa":"#64748b"
                  }}>{t.lbl}</button>
                ))}
                <button className="btn-primary" onClick={()=>duzenle(detayM)}>✏️ Düzenle</button>
              </div>
            </div>

            {/* GENEL SEKME */}
            {detayTab==="genel" && <div>
            {/* Özet kartlar */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:16}}>
              {[
                {label:"Stok Miktarı",val:detayM.stokMiktari?Number(detayM.stokMiktari).toLocaleString("tr-TR")+" kg":"—",renk:"#34d399"},
                {label:"Hesaplanan Optimum",val:detayM.hesaplananOptimum?Number(detayM.hesaplananOptimum).toLocaleString("tr-TR"):"—",renk:"#60a5fa",alt:detayM.hesaplananOptimum?"("+Number(Number(detayM.hesaplananOptimum)/2).toLocaleString("tr-TR")+")":null},
                {label:"Toplam Termin",val:(()=>{const t=detayM.termin;const top=t?[t.akreditif,t.saticiTedarik,t.yol,t.depoKabul].reduce((s,v)=>s+(parseFloat(v)||0),0):parseFloat(detayM.terminSuresi)||0;return top>0?top+" gün":"—";})(),renk:"#fbbf24"},
                {label:"Sipariş Durumu",val:(()=>{
                  const sp=detayM.siparis||{};
                  if(!sp.verildi) return "📋 Bekliyor";
                  if(sp.geldi) return "📦 Geldi";
                  return `⏳ ${sp.sipNo?sp.sipNo+": ":""}${parseFloat(sp.miktar||0).toLocaleString("tr-TR")} kg`;
                })(),renk:detayM.siparis?.geldi?"#60a5fa":detayM.siparis?.verildi?"#34d399":"#94a3b8"},
              ].map((k,i)=>(
                <div key={i} className="card">
                  <div style={{fontSize:11,color:"#475569",marginBottom:6,letterSpacing:"0.06em",textTransform:"uppercase"}}>{k.label}</div>
                  <div style={{fontSize:22,fontWeight:700,color:k.renk}}>{k.val}
                    {k.alt&&<span style={{fontSize:13,color:"#475569",marginLeft:8,fontWeight:400}}>{k.alt}</span>}
                  </div>
                </div>
              ))}
            </div>

            {/* Sipariş Detay Kartı */}
            {detayM.siparis?.verildi && !detayM.siparis?.geldi && (
              <div style={{background:"linear-gradient(135deg,#0d2018,#0f1117)",border:"1px solid #10b98155",borderRadius:10,padding:"12px 18px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:4}}>⏳ Bekleyen Sipariş</div>
                  <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
                    {detayM.siparis.sipNo&&<span style={{color:"#fbbf24",fontWeight:700,fontSize:14}}>📋 {detayM.siparis.sipNo}</span>}
                    <span style={{color:"#34d399",fontWeight:700,fontSize:14}}>{parseFloat(detayM.siparis.miktar||0).toLocaleString("tr-TR")} kg</span>
                    {detayM.siparis.tarih&&<span style={{color:"#475569",fontSize:12}}>📅 {detayM.siparis.tarih}</span>}
                  </div>
                </div>
                <button onClick={()=>setListe(p=>p.map(m=>m.id===detayId?{...m,siparis:{...m.siparis,geldi:true}}:m))}
                  style={{background:"#1d3557",border:"1px solid #3b82f6",borderRadius:8,padding:"9px 18px",color:"#60a5fa",cursor:"pointer",fontWeight:700,fontSize:12,flexShrink:0}}>
                  📦 Sipariş Geldi — Kapat
                </button>
              </div>
            )}
            {detayM.siparis?.geldi && (
              <div style={{background:"#0a0e15",border:"1px solid #3b82f633",borderRadius:10,padding:"10px 18px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{color:"#60a5fa",fontSize:13}}>
                  📦 Sipariş teslim alındı
                  {detayM.siparis.sipNo&&<span style={{color:"#475569",marginLeft:10,fontSize:12}}>{detayM.siparis.sipNo}</span>}
                  {detayM.siparis.tarih&&<span style={{color:"#334155",marginLeft:10,fontSize:11}}>📅 {detayM.siparis.tarih}</span>}
                </div>
                <button onClick={()=>setListe(p=>p.map(m=>m.id===detayId?{...m,siparis:{verildi:false,miktar:"",tarih:"",sipNo:"",geldi:false}}:m))}
                  style={{background:"transparent",border:"1px solid #334155",borderRadius:6,padding:"5px 12px",color:"#475569",cursor:"pointer",fontSize:11}}>
                  ✕ Temizle
                </button>
              </div>
            )}

            {/* Termin & Fiyat detayları */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
              {/* Termin detayları */}
              <div className="card">
                <div className="section-title">⏱ Termin Süresi Dağılımı</div>
                {(()=>{
                  const t = detayM.termin;
                  if (!t || ![t.akreditif,t.saticiTedarik,t.yol,t.depoKabul].some(v=>parseFloat(v)>0)) {
                    return <div style={{color:"#475569",fontSize:13}}>Termin detayı girilmemiş.</div>;
                  }
                  const adimlar = [
                    {key:"akreditif", label:"Akreditif Açma", icon:"🏦", renk:"#3b82f6"},
                    {key:"saticiTedarik", label:"Satıcı Tedarik", icon:"🏭", renk:"#8b5cf6"},
                    {key:"yol", label:"Yol (Nakliye)", icon:"🚢", renk:"#10b981"},
                    {key:"depoKabul", label:"Depo Kabul", icon:"🏗️", renk:"#f59e0b"},
                  ];
                  const top = adimlar.reduce((s,a)=>s+(parseFloat(t[a.key])||0),0);
                  return (
                    <div>
                      {adimlar.map(a=>{
                        const v = parseFloat(t[a.key])||0;
                        const yuzde = top>0?Math.round(v/top*100):0;
                        return v>0?(
                          <div key={a.key} style={{marginBottom:10}}>
                            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                              <span style={{fontSize:12,color:"#94a3b8"}}>{a.icon} {a.label}</span>
                              <span style={{fontSize:12,fontWeight:700,color:a.renk}}>{v} gün</span>
                            </div>
                            <div style={{height:5,background:"#1e2430",borderRadius:3}}>
                              <div style={{width:`${yuzde}%`,height:"100%",background:a.renk,borderRadius:3}}/>
                            </div>
                          </div>
                        ):null;
                      })}
                      <div style={{borderTop:"1px solid #1e2430",paddingTop:8,marginTop:4,display:"flex",justifyContent:"space-between"}}>
                        <span style={{fontSize:12,color:"#64748b"}}>Toplam Termin</span>
                        <span style={{fontSize:14,fontWeight:700,color:"#fbbf24"}}>{top} gün</span>
                      </div>
                    </div>
                  );
                })()}
              </div>
              {/* Fiyat detayları + Toplam stok bedeli */}
              <div className="card">
                <div className="section-title">💰 Fiyat & Maliyet</div>
                {(()=>{
                  const f = detayM.fiyat;
                  if (!f || !parseFloat(f.birimFiyat)) return <div style={{color:"#475569",fontSize:13}}>Fiyat bilgisi girilmemiş.</div>;
                  const bp = parseFloat(f.birimFiyat)||0;
                  const md = parseFloat(f.maliyetDeger)||0;
                  const maliyet = calcMal(f, kurlar);
                  const birimVaris = calcVaris(f, kurlar);
                  const pb = f.paraBirimi||"USD";
                  const birim = f.fiyatBirimi||"ton";
                  const sec = TESLIMAT_SEKILLERI.find(t=>t.kod===f.teslimatSekli);
                  // Toplam stok bedeli (kg cinsinden stok → birime çevir)
                  const stokKg = parseFloat(detayM.stokMiktari)||0;
                  const stokBirimde = birim==="ton" ? stokKg/1000 : stokKg;
                  const toplamBedel = birimVaris * stokBirimde;
                  // Döviz dönüşümleri
                  const dovizHedefler = pb==="USD"?["TRY","EUR"]:pb==="EUR"?["TRY","USD"]:pb==="GBP"?["TRY","USD","EUR"]:pb==="TRY"?["USD","EUR","GBP"]:[];
                  const dovizSatirlari = kurlar ? dovizHedefler.map(h=>{
                    const k = (kurlar||{})[`${pb}_${h}`]||0;
                    return k>0 ? {pb:h, bv:(birimVaris*k), tb:(toplamBedel*k)} : null;
                  }).filter(Boolean) : [];

                  return (
                    <div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                        {[
                          {label:`Birim Fiyat (/${birim})`, val:`${bp.toFixed(2)} ${pb}`, renk:"#60a5fa"},
                          {label:`Nakliye/Maliyet${f.maliyetTip==="yuzde"?` (%${md}%)`:""}`, val:`${maliyet.toFixed(2)} ${pb}`, renk:"#a78bfa"},
                          {label:"Teslim Şekli", val:f.teslimatSekli||"—", renk:"#94a3b8"},
                          {label:`Birim Varış Maliyeti (/${birim})`, val:`${birimVaris.toFixed(2)} ${pb}`, renk:"#34d399"},
                        ].map((k,i)=>(
                          <div key={i} style={{background:"#0f1117",borderRadius:8,padding:"10px 12px"}}>
                            <div style={{fontSize:10,color:"#475569",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.06em"}}>{k.label}</div>
                            <div style={{fontSize:13,fontWeight:700,color:k.renk}}>{k.val}</div>
                          </div>
                        ))}
                      </div>
                      {/* Toplam stok bedeli */}
                      <div style={{background:"linear-gradient(135deg,#0d2018,#0f1117)",border:"1px solid #10b98155",borderRadius:10,padding:"12px 14px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div>
                          <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>📦 Toplam Stok Bedeli</div>
                          <div style={{fontSize:11,color:"#475569"}}>{stokKg.toLocaleString("tr-TR")} kg × {birimVaris.toFixed(2)} {pb}/{birim}</div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:20,fontWeight:700,color:"#34d399"}}>{toplamBedel.toLocaleString("tr-TR",{maximumFractionDigits:2})} {pb}</div>
                        </div>
                      </div>
                      {/* Döviz dönüşümleri */}
                      {dovizSatirlari.length>0 && (
                        <div style={{background:"#0f1117",border:"1px solid #1e2430",borderRadius:8,padding:"10px 12px",marginBottom:10}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                            <span style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:700}}>💱 Döviz Karşılıkları</span>
                            <span style={{fontSize:10,color:"#334155"}}>{kurYukleniyor?"⏳ Yükleniyor...":kurlar?`Kur tarihi: ${kurlar.tarih}`:"—"}</span>
                          </div>
                          <div style={{display:"grid",gridTemplateColumns:`repeat(${dovizSatirlari.length},1fr)`,gap:8}}>
                            {dovizSatirlari.map((d,i)=>(
                              <div key={i} style={{textAlign:"center",padding:"10px 8px",background:"#141820",borderRadius:8,border:"1px solid #252f40"}}>
                                <div style={{fontSize:10,color:"#475569",marginBottom:4}}>{pb} → {d.pb}</div>
                                <div style={{fontSize:14,fontWeight:700,color:"#fbbf24"}}>{d.bv.toFixed(2)} {d.pb}<span style={{fontSize:10,color:"#475569",fontWeight:400}}>/{birim}</span></div>
                                <div style={{fontSize:10,color:"#64748b",marginTop:3,borderTop:"1px solid #1e2430",paddingTop:3}}>Toplam: {d.tb.toLocaleString("tr-TR",{maximumFractionDigits:0})} {d.pb}</div>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}
                      {kurYukleniyor && <div style={{fontSize:11,color:"#475569",marginBottom:8}}>⏳ Güncel kurlar yükleniyor...</div>}
                      {!kurlar && !kurYukleniyor && <div style={{fontSize:11,color:"#475569",marginBottom:8}}>⚠️ Döviz kurları yüklenemedi</div>}
                      {sec && <div style={{fontSize:11,color:"#475569",background:"#0f1117",borderRadius:6,padding:"8px 10px",lineHeight:1.6,marginBottom:10}}>
                        <span style={{color:"#3b82f6",fontWeight:700}}>{sec.kod}</span> — {sec.aciklama}
                      </div>}
                                            {/* Paketleme & Menşei */}
                      {(detayM.paketleme || detayM.menseiUlke || detayM.tedarikci) && (
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10}}>
                          {detayM.paketleme && (()=>{
                            const pk = PAKETLEME_TIPLERI.find(p=>p.kod===detayM.paketleme);
                            return pk ? (
                              <div style={{background:"#0f1117",borderRadius:8,padding:"10px 12px"}}>
                                <div style={{fontSize:10,color:"#475569",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.06em"}}>📦 Paketleme</div>
                                <div style={{fontSize:13,fontWeight:700,color:"#60a5fa"}}>{pk.ad}</div>
                                <div style={{fontSize:11,color:"#475569",marginTop:3}}>{pk.aciklama}</div>
                              </div>
                            ) : null;
                          })()}
                          {(detayM.menseiUlke || detayM.tedarikci) && (
                            <div style={{background:"#0f1117",borderRadius:8,padding:"10px 12px"}}>
                              <div style={{fontSize:10,color:"#475569",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.06em"}}>🌍 Menşei Ülke</div>
                              {detayM.menseiUlke && <div style={{fontSize:13,fontWeight:700,color:"#34d399"}}>{detayM.menseiUlke}</div>}
                              {detayM.tedarikci && (
                                <div style={{fontSize:12,color:"#fbbf24",marginTop:5,display:"flex",alignItems:"center",gap:4}}>
                                  <span style={{fontSize:10}}>🏭</span> {detayM.tedarikci}
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>
            </div>

            {/* Optimum Miktar Analizi */}
            {(()=>{
              const s12VeriOpt = [
                ...AYLAR.map(a=>({deger:parseFloat(detayM.tuketim["2025"]?.[a])||0})),
                ...["Ocak","Şubat"].map(a=>({deger:parseFloat(detayM.tuketim["2026"]?.[a])||0}))
              ].slice(-12);
              const topS12Opt = s12VeriOpt.reduce((s,x)=>s+x.deger,0);
              const gunlukOpt = s12VeriOpt.length>0 ? topS12Opt/(s12VeriOpt.length*30) : 0;

              // Termin süresi
              const terminGun = (()=>{
                const t = detayM.termin;
                if(t) {
                  const top = [t.akreditif,t.saticiTedarik,t.yol,t.depoKabul].reduce((s,v)=>s+(parseFloat(v)||0),0);
                  if(top>0) return top;
                }
                return parseFloat(detayM.terminSuresi)||0;
              })();

              const minMiktar  = Math.round(gunlukOpt * terminGun);
              const optMiktar  = Math.round(gunlukOpt * terminGun * 2);
              const maksMiktar = minMiktar + optMiktar;

              // Her birinin yarısına ne zaman gelinir
              const stokSu = parseFloat(detayM.stokMiktari)||0;
              const tarihHesaplaOpt = (hedefMiktar) => {
                if(!gunlukOpt || hedefMiktar<=0 || stokSu<=hedefMiktar) return null;
                const gun = Math.round((stokSu - hedefMiktar) / gunlukOpt);
                const d = new Date();
                d.setDate(d.getDate()+gun);
                // O tarihte stokta ne kadar kalır ve kaç günlük ömrü var
                const kalanStok = hedefMiktar; // stok tam yarı seviyesine inmiş olacak
                const kalanGunO = gunlukOpt>0 ? Math.round(kalanStok/gunlukOpt) : null;
                return {gun, tarih: d.toLocaleDateString("tr-TR",{day:"2-digit",month:"long",year:"numeric"}), kalanStok, kalanGunO};
              };

              const minYarisi  = tarihHesaplaOpt(Math.round(minMiktar/2));
              const optYarisi  = tarihHesaplaOpt(Math.round(optMiktar/2));

                      Bu hammadde için henüz fiyat geçmişi kaydı yok.<br/>
                      <span style={{fontSize:12}}>Fiyat bilgisini güncelleyerek kaydettiğinizde eski fiyat buraya eklenir.</span>
                    </div>
                  )}
                </div>
              );
            })()}

}
